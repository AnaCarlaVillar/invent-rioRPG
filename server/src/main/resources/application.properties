spring.application.name=inventario
server.port=8080
spring.web.resources.static-locations=file:../

# Data is persisted in an external Postgres database (not on local disk) so it
# survives Render's free-tier restarts. Set DATABASE_URL/USERNAME/PASSWORD as
# environment variables pointing at your Postgres instance (e.g. Neon, Supabase).
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/inventario}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.sql.init.mode=always
